# Decap CMS configuration
#
# Production backend: GitHub (4GoosE2/personal-portfolio).
# Authentication runs through Netlify's OAuth provider — see README
# ("Deployment" section) for the one-time GitHub OAuth app setup.
#
# Local editing: run `npx decap-server` alongside `npm run dev`, then open
# http://localhost:4321/admin/ — local_backend below makes the CMS talk to
# your local git repo directly, no login needed.

backend:
  name: github
  repo: 4GoosE2/personal-portfolio
  branch: main
  base_url: https://api.netlify.com

local_backend: true

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  # Categories and the subcategory suggestion list live here so both can be
  # edited without touching code. The site reads the same file via
  # src/lib/categories.ts.
  - name: "settings"
    label: "Settings"
    files:
      - name: "taxonomy"
        label: "Categories & Subcategories"
        file: "src/data/taxonomy.json"
        fields:
          - label: "Categories"
            name: "categories"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - label: "Description"
                name: "blurb"
                widget: "text"
                hint: "One line, shown under the category on the home and category pages."
              - label: "URL slug"
                name: "slug"
                widget: "string"
                required: false
                hint: "Leave blank to generate from the name. Only set this to keep an existing URL after renaming."
          - label: "Subcategories"
            name: "subcategories"
            widget: "list"
            required: false
            summary: "{{fields.name}}"
            hint: "The suggestions offered when tagging a project with a subcategory. Add a new one here first, then pick it on the project."
            fields:
              - { label: "Name", name: "name", widget: "string" }
          - label: "Origin — tracks"
            name: "tracks"
            widget: "list"
            summary: "{{fields.name}}"
            hint: "Top level of where a project came from, e.g. Educational Projects."
            fields:
              - { label: "Name", name: "name", widget: "string" }
          - label: "Origin — sources"
            name: "sources"
            widget: "list"
            required: false
            summary: "{{fields.name}}"
            hint: "Second level: the school, workplace, or kind of private project."
            fields:
              - { label: "Name", name: "name", widget: "string" }
          - label: "Origin — contexts"
            name: "contexts"
            widget: "list"
            required: false
            summary: "{{fields.name}}"
            hint: "Third level: the course, the apartment, the specific project at work."
            fields:
              - { label: "Name", name: "name", widget: "string" }

  - name: "projects"
    label: "Projects"
    folder: "src/content/projects"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "Category"
        name: "category"
        widget: "relation"
        collection: "settings"
        file: "taxonomy"
        search_fields: ["categories.*.name"]
        value_field: "categories.*.name"
        display_fields: ["categories.*.name"]
      - label: "Subcategory"
        name: "subcategory"
        widget: "relation"
        required: false
        collection: "settings"
        file: "taxonomy"
        search_fields: ["subcategories.*.name"]
        value_field: "subcategories.*.name"
        display_fields: ["subcategories.*.name"]
        hint: "Start typing to filter. To use a new one, add it under Settings first."
      - label: "Origin — track"
        name: "track"
        widget: "relation"
        required: false
        collection: "settings"
        file: "taxonomy"
        search_fields: ["tracks.*.name"]
        value_field: "tracks.*.name"
        display_fields: ["tracks.*.name"]
        hint: "Educational, private, or work. Leave blank to keep a project out of the origin browse."
      - label: "Origin — source"
        name: "source"
        widget: "relation"
        required: false
        collection: "settings"
        file: "taxonomy"
        search_fields: ["sources.*.name"]
        value_field: "sources.*.name"
        display_fields: ["sources.*.name"]
        hint: "The school, workplace, or kind of private project."
      - label: "Origin — context"
        name: "context"
        widget: "relation"
        required: false
        collection: "settings"
        file: "taxonomy"
        search_fields: ["contexts.*.name"]
        value_field: "contexts.*.name"
        display_fields: ["contexts.*.name"]
        hint: "The course this was done in, or the specific project. Course names here link from the Education page."
      - label: "Tags"
        name: "tags"
        widget: "list"
        default: []
        field: { label: "Tag", name: "tag", widget: "string" }
      - { label: "Date / analytical moment", name: "date", widget: "string", hint: "e.g. Mid-2025" }
      - label: "About this project"
        name: "note"
        widget: "text"
        required: false
        hint: "Shown in the sticky panel: why you took this on, what it was for, anything a reader should know first."
      - label: "Feedback"
        name: "feedback"
        widget: "text"
        required: false
        hint: "Shown in a panel at the very foot of the page, spanning both columns. Leave blank and nothing appears."
      - label: "Key metrics"
        name: "metrics"
        widget: "list"
        required: false
        summary: "{{fields.label}}: {{fields.value}}"
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - { label: "Value", name: "value", widget: "string" }
      - { label: "Cover image", name: "cover", widget: "image", required: false }
      - label: "Additional images"
        name: "images"
        widget: "list"
        required: false
        field: { label: "Image", name: "image", widget: "image" }
      - { label: "Body", name: "body", widget: "markdown" }
